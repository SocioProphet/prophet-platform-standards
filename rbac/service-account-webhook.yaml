# ServiceAccount: Webhook Handler
# Implements ADR-050 (DevSecOps, RBAC, and Audit Standards)
#
# Purpose: Service account for the webhook handler pod
# Namespace: sociosphere
# Permissions: read config, write to queue, trigger Tekton PipelineRuns
#
# ADR References: ADR-040, ADR-050
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhook-sa
  namespace: sociosphere
  labels:
    app.kubernetes.io/part-of: prophet-platform
    app.kubernetes.io/component: webhook
    rbac.sociosphere.io/workload: webhook
  annotations:
    adr.sociosphere.io/reference: "ADR-040,ADR-050"
    adr.sociosphere.io/description: |
      Service account for the webhook handler. Scoped to sociosphere namespace.
      Permissions: read ConfigMaps (config), write to queue (via webhook service),
      trigger Tekton EventListeners, write to audit log.
automountServiceAccountToken: false
---
# Role: Permissions scoped to sociosphere namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: webhook-role
  namespace: sociosphere
  labels:
    app.kubernetes.io/part-of: prophet-platform
    app.kubernetes.io/component: webhook
  annotations:
    adr.sociosphere.io/reference: "ADR-050"
rules:
  # Read configuration ConfigMaps
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
    resourceNames:
      - webhook-config
      - platform-config

  # Trigger Tekton EventListener (write event to trigger pipeline)
  - apiGroups: ["tekton.dev"]
    resources: ["eventlisteners"]
    verbs: ["get", "list"]

  # Create Tekton PipelineRuns (trigger CI/CD)
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["create", "get", "list", "watch"]

  # Write to queue (if using Kubernetes Job as queue mechanism)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list"]

  # Read own pod metadata (for health reporting)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]

  # Read own ServiceAccount token (if needed for API calls)
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
    resourceNames:
      - webhook-sa
---
# RoleBinding: Bind ServiceAccount to Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: webhook-role-binding
  namespace: sociosphere
  labels:
    app.kubernetes.io/part-of: prophet-platform
    app.kubernetes.io/component: webhook
  annotations:
    adr.sociosphere.io/reference: "ADR-050"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: webhook-role
subjects:
  - kind: ServiceAccount
    name: webhook-sa
    namespace: sociosphere
