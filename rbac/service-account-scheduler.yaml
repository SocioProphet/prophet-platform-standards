# ServiceAccount: Scheduler
# Implements ADR-050 (DevSecOps, RBAC, and Audit Standards)
#
# Purpose: Service account for the scheduler pod
# Namespace: sociosphere
# Permissions: trigger Tekton PipelineRuns, update propagation registry, query GitHub API
#
# ADR References: ADR-040, ADR-050
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scheduler-sa
  namespace: sociosphere
  labels:
    app.kubernetes.io/part-of: prophet-platform
    app.kubernetes.io/component: scheduler
    rbac.sociosphere.io/workload: scheduler
  annotations:
    adr.sociosphere.io/reference: "ADR-040,ADR-050"
    adr.sociosphere.io/description: |
      Service account for the scheduler. Scoped to sociosphere namespace.
      Permissions: trigger Tekton PipelineRuns, update propagation registry
      ConfigMap, create/read Jobs, read platform config, write to audit log.
automountServiceAccountToken: false
---
# Role: Permissions scoped to sociosphere namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scheduler-role
  namespace: sociosphere
  labels:
    app.kubernetes.io/part-of: prophet-platform
    app.kubernetes.io/component: scheduler
  annotations:
    adr.sociosphere.io/reference: "ADR-050"
rules:
  # Read platform configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
    resourceNames:
      - scheduler-config
      - platform-config
      - propagation-registry

  # Update propagation registry (tracks which repos have been processed)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["update", "patch"]
    resourceNames:
      - propagation-registry

  # Trigger Tekton PipelineRuns (CI/CD kickoff)
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["create", "get", "list", "watch", "delete"]

  # Read Tekton Pipelines and Tasks (discover available pipelines)
  - apiGroups: ["tekton.dev"]
    resources: ["pipelines", "tasks"]
    verbs: ["get", "list"]

  # Manage scheduled jobs
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]

  # Read own pod metadata
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Read secrets for GitHub API token (for rate limit checking)
  # Note: only the specific named secret, not all secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      - github-api-token

  # Read own ServiceAccount token
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
    resourceNames:
      - scheduler-sa
---
# RoleBinding: Bind ServiceAccount to Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scheduler-role-binding
  namespace: sociosphere
  labels:
    app.kubernetes.io/part-of: prophet-platform
    app.kubernetes.io/component: scheduler
  annotations:
    adr.sociosphere.io/reference: "ADR-050"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scheduler-role
subjects:
  - kind: ServiceAccount
    name: scheduler-sa
    namespace: sociosphere
