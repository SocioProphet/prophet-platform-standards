# Kyverno Policy: Resource Limits
# Implements ADR-050 (DevSecOps, RBAC, and Audit Standards)
#
# All pods MUST define CPU and memory requests AND limits.
# This prevents resource starvation and enables accurate scheduling.
#
# Enforcement mode: Enforce
# Failure behavior: Reject pod admission
#
# ADR References: ADR-050
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  labels:
    app.kubernetes.io/part-of: prophet-platform
    kyverno.io/category: resource-management
  annotations:
    policies.kyverno.io/title: Require CPU and Memory Resource Limits
    policies.kyverno.io/category: Resource Management
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod, Container
    adr.sociosphere.io/reference: "ADR-050"
    policies.kyverno.io/description: |
      All containers must define CPU and memory requests and limits.
      This ensures predictable resource usage, prevents noisy neighbors,
      and enables the cluster scheduler to make optimal placement decisions.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    # Rule 1: Require resource limits on all containers
    - name: require-container-resource-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - tekton-pipelines
      validate:
        message: |
          All containers must define CPU and memory requests and limits.
          Example:
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"
          See ADR-050 and docs/GETTING_STARTED.md for guidance.
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    memory: "?*"
                    cpu: "?*"
                  limits:
                    memory: "?*"
                    cpu: "?*"

    # Rule 2: Require resource limits on init containers
    - name: require-init-container-resource-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
      validate:
        message: |
          All init containers must define CPU and memory requests and limits.
        pattern:
          spec:
            =(initContainers):
              - resources:
                  requests:
                    memory: "?*"
                    cpu: "?*"
                  limits:
                    memory: "?*"
                    cpu: "?*"

    # Rule 3: Enforce maximum resource limits (prevent unbounded allocation)
    - name: enforce-max-resource-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - sociosphere
      validate:
        message: |
          Container resource limits exceed platform maximums.
          Maximum limits: CPU=4, Memory=8Gi.
          For higher limits, request an exception via ADR amendment.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.containers[].resources.limits.cpu | to_number(@) }}"
                operator: GreaterThan
                value: "4"
              - key: "{{ request.object.spec.containers[].resources.limits.memory }}"
                operator: GreaterThan
                value: "8Gi"
